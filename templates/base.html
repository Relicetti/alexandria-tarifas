<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tarifas{% endblock %} — Alexandria</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f5f7fa; }
    .navbar { background: #1a3a5c !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: #f0c040 !important; }
    .card-resultado { border-left: 4px solid #1a3a5c; }
    .badge-verde { background: #198754; }
    .badge-amarela { background: #ffc107; color: #000; }
    .badge-verm { background: #dc3545; }
    .desconto-ok { color: #198754; font-weight: 600; }
    .desconto-baixo { color: #dc3545; font-weight: 600; }
    .table th { background: #1a3a5c; color: #fff; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="/">⚡ Alexandria Tarifas</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/clientes">Clientes</a></li>
        <li class="nav-item"><a class="nav-link btn btn-warning text-dark ms-2 px-3" href="/faturas/nova">+ Nova Fatura</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
